# ============================================================
# CMS — Production Stack
# ============================================================
# Prerequisites:
#   1. Copy .env.example to .env and set all values
#   2. Generate TLS certificates:
#        bash nginx/generate-certs.sh
#
# Pull image from registry and start:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Or build locally (no registry needed):
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Logs:
#   docker compose -f docker-compose.prod.yml logs -f cms
# ============================================================

services:

  # ── CMS Application ───────────────────────────────────────
  cms:
    # Pull pre-built image from GitHub Container Registry.
    # To build locally instead, comment out `image:` and
    # uncomment `build: .`
    image: ghcr.io/${GITHUB_ORG}/cms:${CMS_VERSION:-latest}
    # build: .
    container_name: cms-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Internal Docker network addresses override the .env defaults
      # (which point to localhost and are intended for local dev only)
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      MINIO_ENDPOINT: http://minio:9000
      # Pass through the rest from .env
      DB_NAME:           ${DB_NAME}
      DB_USERNAME:       ${DB_USERNAME}
      DB_PASSWORD:       ${DB_PASSWORD}
      MINIO_ACCESS_KEY:  ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY:  ${MINIO_SECRET_KEY}
      MINIO_BUCKET:      ${MINIO_BUCKET}
      JWT_SECRET:        ${JWT_SECRET}
      SUBSYSTEM_ID:      ${SUBSYSTEM_ID}
      SUBSYSTEM_SECRET:  ${SUBSYSTEM_SECRET}
    expose:
      - "8080"   # only reachable inside the Docker network (nginx handles public access)
    healthcheck:
      # Uses the 'readiness' health group which only checks DB and MinIO.
      # aisWebSocket is excluded so a missing AIS connection does not block nginx startup.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s   # give Spring Boot time to fully start before counting failures

  # ── Nginx (TLS termination + reverse proxy) ───────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cms-nginx
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_healthy
    ports:
      - "80:80"    # redirects to HTTPS
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: cms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO bucket initializer (runs once) ──────────────────
  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:     ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET:-anomaly-clips} &&
        echo 'Bucket ready.'
      "

volumes:
  postgres_data:
  minio_data:

