# ============================================================
# nginx-minio.conf
# TLS termination proxy for MinIO S3 API.
#
# The container exposes port 443 internally; docker-compose.deploy.yml maps
# that to ${MINIO_HTTPS_PORT:-9443} on the host.
#
# All presigned PUT/GET URLs generated by CMS contain the public HTTPS
# address (e.g. https://192.168.137.1:9443/...).  AIS and the Flutter app
# download/upload directly to this proxy -- they never reach MinIO on :9000.
# ============================================================
events {
    worker_connections 512;
}
http {
    server {
        listen 443 ssl;
        server_name _;
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        client_max_body_size 512m;
        location / {
            proxy_pass              http://minio:9000;
            # Host header MUST be preserved unchanged from the client request.
            # Presigned URL HMAC signatures are computed over the Host value;
            # if nginx rewrites it, MinIO's signature verification returns 403.
            proxy_set_header        Host              $http_host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto $scheme;
            proxy_buffering         off;
            proxy_request_buffering off;
            client_max_body_size    0;
        }
    }
}