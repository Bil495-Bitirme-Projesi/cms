# ── Central Management Subsystem Configuration ──

spring:
  profiles:
    active: dev

  application:
    name: cms

  # ── PostgreSQL ──
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cms_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8050

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIGRldi1vbmx5IHNlY3JldCBrZXkgdGhhdCBtdXN0IGJlIGNoYW5nZWQ=}
  expiration-ms: 86400000        # 24 hours
  subsystem-expiration-ms: 86400000

# ── MinIO ──
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minio}
  secret-key: ${MINIO_SECRET_KEY:admin123}
  bucket-name: ${MINIO_BUCKET:anomaly-clips}
  presign-expiry-seconds: 300    # 5 minutes
  # Path to a PEM (.crt) file to trust for MINIO_ENDPOINT HTTPS connections.
  # Required when MINIO_ENDPOINT uses a self-signed cert (e.g. nginx-minio in deploy stack).
  # Leave blank for HTTP or CA-signed TLS — no extra config needed for local dev.
  ca-cert-path: ${MINIO_CA_CERT_PATH:}

# ── Firebase ──
firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}

# ── Subsystem Credentials ──
subsystem:
  id: ${SUBSYSTEM_ID:ai-inference-node}
  secret: ${SUBSYSTEM_SECRET:dev-only-subsystem-secret-change-in-prod}

# ── Logging ──
logging:
  level:
    com.bitiriciler32.cms: DEBUG
    org.springframework.security: INFO

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always   # shows DB, MinIO, diskSpace sub-components
      # readiness group: used by Docker healthcheck.
      # Only includes infrastructure dependencies (db, minio).
      # aisWebSocket is intentionally excluded — AIS not being connected
      # is an operational concern, not a reason to keep nginx from starting.
      group:
        readiness:
          include: db,minio

