# ============================================================
# CMS — Application Stack (no TLS / no nginx)
# ============================================================
# Use this file to run the full application stack locally
# using the pre-built image from the registry, without the
# nginx TLS layer.
#
# Typical uses:
#   - Verifying a registry image works before deploying to prod
#   - Integration testing against a real DB + MinIO
#   - Running the app on a dev machine without IDE
#
# For local development with IDE hot-reload, use:
#   docker compose up -d          (docker-compose.yml — infra only)
#
# For the full production stack with TLS, use:
#   docker compose -f docker-compose.prod.yml up -d
#
# Usage:
#   docker compose -f docker-compose.app.yml pull
#   docker compose -f docker-compose.app.yml up -d
#   docker compose -f docker-compose.app.yml logs -f cms
#   docker compose -f docker-compose.app.yml down
# ============================================================

name: cms-app

services:

  # ── CMS Application (pulled from registry) ───────────────
  cms:
    image: ghcr.io/${GITHUB_ORG}/cms:${CMS_VERSION:-latest}
    container_name: cms-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8050:8050"   # directly exposed — no nginx in front
    environment:
      DB_URL:          jdbc:postgresql://postgres:5432/${DB_NAME}
      MINIO_ENDPOINT:  http://minio:9000
      DB_NAME:         ${DB_NAME}
      DB_USERNAME:     ${DB_USERNAME}
      DB_PASSWORD:     ${DB_PASSWORD}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:    ${MINIO_BUCKET}
      JWT_SECRET:      ${JWT_SECRET}
      SUBSYSTEM_ID:    ${SUBSYSTEM_ID}
      SUBSYSTEM_SECRET: ${SUBSYSTEM_SECRET}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-firebase-service-account.json}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8050/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: cms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO bucket initializer (runs once) ──────────────────
  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:     ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET:-anomaly-clips} &&
        echo 'Bucket ready.'
      "

volumes:
  postgres_data:
  minio_data:

